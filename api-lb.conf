worker_processes auto;
worker_rlimit_nofile 65535;

events {
    worker_connections 16384;
    use epoll;
    multi_accept on;
}

http {
    # Re-resolve Docker DNS every 5 s to pick up new API replicas
    resolver 127.0.0.11 valid=5s ipv6=off;

    upstream api_backend {
        least_conn;
        server signal-catcher-api-1:4000 max_fails=10 fail_timeout=5s;
        server signal-catcher-api-2:4000 max_fails=10 fail_timeout=5s;
        server signal-catcher-api-3:4000 max_fails=10 fail_timeout=5s;
        server signal-catcher-api-4:4000 max_fails=10 fail_timeout=5s;
        keepalive 512;
        keepalive_requests 10000;
        keepalive_timeout 60s;
    }

    server {
        listen 80;

        client_max_body_size 5m;
        client_body_buffer_size 256k;

        # Disable access log under heavy load — saves disk I/O
        access_log off;

        # SSE — persistent connection, no retry, no proxy buffering
        location /api/stream {
            proxy_pass         http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            proxy_set_header   Host              $host;
            proxy_read_timeout 300s;
            proxy_buffering    off;
            proxy_cache        off;
            proxy_next_upstream off;
        }

        location / {
            proxy_pass         http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;

            proxy_connect_timeout  3s;
            proxy_read_timeout     5s;
            proxy_send_timeout     5s;

            # Retry on the next replica only on connection errors or 502
            # NOT on 503 — buffer-full 503s are intentional and all replicas
            # would return the same, so retrying just wastes time and inflates max_fails
            proxy_next_upstream         error timeout http_502;
            proxy_next_upstream_tries   2;
            proxy_next_upstream_timeout 5s;

            # Don't buffer — return 202 to client immediately
            proxy_buffering         off;
            proxy_request_buffering off;
        }
    }
}
