services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.13-management
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
      - ./rabbitmq/rabbitmq.conf:/etc/rabbitmq/conf.d/signal-catcher.conf:ro
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
    mem_limit: 2g
    memswap_limit: 2g
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  influxdb:
    image: influxdb:2.7
    ports:
      - "8086:8086"
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: ${INFLUXDB_USER}
      DOCKER_INFLUXDB_INIT_PASSWORD: ${INFLUXDB_PASS}
      DOCKER_INFLUXDB_INIT_ORG: ${INFLUXDB_ORG}
      DOCKER_INFLUXDB_INIT_BUCKET: ${INFLUXDB_BUCKET}
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: ${INFLUXDB_TOKEN}
      DOCKER_INFLUXDB_INIT_RETENTION: 30d
      INFLUXD_STORAGE_CACHE_MAX_MEMORY_SIZE: 1073741824
      INFLUXD_STORAGE_CACHE_SNAPSHOT_MEMORY_SIZE: 26214400
    mem_limit: 4g
    memswap_limit: 4g
    volumes:
      - influxdb_data:/var/lib/influxdb2
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "influx", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  minio:
    image: minio/minio:latest
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_PASS}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  rabbitmq-init:
    image: curlimages/curl:latest
    depends_on:
      rabbitmq:
        condition: service_healthy
    environment:
      RABBITMQ_USER: ${RABBITMQ_USER}
      RABBITMQ_PASS: ${RABBITMQ_PASS}
    entrypoint: >
      sh -c "curl -sf -u $$RABBITMQ_USER:$$RABBITMQ_PASS -X PUT http://rabbitmq:15672/api/policies/%2F/lazy-all -H 'Content-Type: application/json' -d '{\"pattern\":\".*\",\"definition\":{\"queue-mode\":\"lazy\"},\"apply-to\":\"queues\",\"priority\":0}' && echo 'lazy-all policy applied'"
    restart: "no"

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_USER: ${MINIO_USER}
      MINIO_PASS: ${MINIO_PASS}
      MINIO_BUCKET: ${MINIO_BUCKET}
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $$MINIO_USER $$MINIO_PASS &&
      mc mb local/$$MINIO_BUCKET --ignore-existing &&
      echo 'Bucket ready.'
      "
    restart: "no"

  # API runs as 4 replicas — no direct port binding, api-lb handles external access
  api:
    build:
      context: ./api
    environment:
      RABBITMQ_URL: amqp://${RABBITMQ_USER}:${RABBITMQ_PASS}@rabbitmq:5672
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_USER: ${RABBITMQ_USER}
      RABBITMQ_PASS: ${RABBITMQ_PASS}
      INFLUXDB_URL: http://influxdb:8086
      INFLUXDB_TOKEN: ${INFLUXDB_TOKEN}
      INFLUXDB_ORG: ${INFLUXDB_ORG}
      INFLUXDB_BUCKET: ${INFLUXDB_BUCKET}
      MINIO_ENDPOINT: minio
      MINIO_PORT: "9000"
      MINIO_USER: ${MINIO_USER}
      MINIO_PASS: ${MINIO_PASS}
      MINIO_BUCKET: ${MINIO_BUCKET}
      PORT: 4000
    depends_on:
      rabbitmq:
        condition: service_healthy
      influxdb:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    restart: unless-stopped
    deploy:
      replicas: 4
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:4000/health"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s

  # nginx load balancer — exposes port 4000 externally, round-robins to api replicas
  api-lb:
    image: nginx:1.27-alpine
    ports:
      - "4000:80"
    volumes:
      - ./api-lb.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  # Consumer runs as 3 replicas for parallel queue draining
  consumer:
    build:
      context: ./consumer
    environment:
      RABBITMQ_URL: amqp://${RABBITMQ_USER}:${RABBITMQ_PASS}@rabbitmq:5672
      INFLUXDB_URL: http://influxdb:8086
      INFLUXDB_TOKEN: ${INFLUXDB_TOKEN}
      INFLUXDB_ORG: ${INFLUXDB_ORG}
      INFLUXDB_BUCKET: ${INFLUXDB_BUCKET}
      MINIO_ENDPOINT: minio
      MINIO_PORT: "9000"
      MINIO_USER: ${MINIO_USER}
      MINIO_PASS: ${MINIO_PASS}
      MINIO_BUCKET: ${MINIO_BUCKET}
      REDIS_URL: redis://redis:6379
    depends_on:
      rabbitmq:
        condition: service_healthy
      influxdb:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      replicas: 5

  frontend:
    build:
      context: ./frontend
    ports:
      - "8080:80"
    restart: unless-stopped

  grafana:
    image: grafana/grafana:10.4.0
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASS}
      INFLUXDB_URL: http://influxdb:8086
      INFLUXDB_TOKEN: ${INFLUXDB_TOKEN}
      INFLUXDB_ORG: ${INFLUXDB_ORG}
      INFLUXDB_BUCKET: ${INFLUXDB_BUCKET}
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
      - grafana_data:/var/lib/grafana
    depends_on:
      - influxdb

volumes:
  rabbitmq_data:
  influxdb_data:
  minio_data:
  grafana_data:
